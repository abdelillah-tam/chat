<li
  class="user-item flex p-5 cursor-pointer"
  [class.bg-slate-100]="index() == selectedUserIndex()"
>
  <div class="flex items-center">
    <div class="h-12 w-12 rounded-xl bg-white">
      <img
        [src]="
          user()?.profilePictureLink
            ? user()?.profilePictureLink
            : './assets/user.png'
        "
        class="h-full w-full rounded-xl object-cover"
      />
    </div>
    <div class="user-name flex flex-col items-center pl-3">
      <p class="text-xl text-gray-950">
        {{ user()?.firstName }} {{ user()?.lastName }}
      </p>
    </div>
  </div>
</li>
