<aside class="flex w-full h-full">
  <div
    class="h-full flex flex-col"
    [class]="
      !isSmallScreen ? ['basis-1/3'] : closedChat ? ['basis-full'] : ['hidden']
    "
  >
    <div class="w-full flex justify-center px-2 py-4 gap-2">
      @if (isSmallScreen) {
        <button
          class="flex items-center cursor-pointer"
          (click)="openSidenav()"
        >
          <mat-icon fontIcon="menu" class="material-symbols-rounded"></mat-icon>
        </button>
      }
      <div class="bg-white rounded-xl grow">
        <input
          class="input-style"
          [formControl]="searchFormControl"
          placeholder="Search for a user"
        />
      </div>
    </div>
    <ul class="w-full flex flex-col grow overflow-y-auto">
      @if (loading) {
        <div class="w-full flex justify-center items-center grow">
          <mat-spinner class="loading" [diameter]="50"></mat-spinner>
        </div>
      } @else {
        @for (user of users; track trackByFn(user)) {
          <app-user-item
            (click)="openChatWindow(passUser(user).id, $index)"
            [user]="passUser(user)"
            [index]="$index"
            [selectedUserIndex]="selectedUserIndex"
          ></app-user-item>
          
        } @empty {
          <p class="w-full text-center">No users</p>
        }
      }
    </ul>
  </div>

  @if (!closedChat) {
    <section
      class="chat-section"
      [class]="!isSmallScreen ? ['basis-2/3'] : ['basis-full']"
    >
      <router-outlet />
    </section>
  } @else if (closedChat && !isSmallScreen) {
    <section
      class="basis-2/3 bg-slate-100 flex flex-col items-center justify-center gap-2"
    >
      <div
        class="bg-slate-900 rounded-full px-6 py-2 flex items-center justify-center"
      >
        <app-logo [color]="'text-white'"></app-logo>
      </div>
      <p>Select a conversation</p>
      <p class="text-gray-500">Choose a contact to start chatting</p>
    </section>
  }
</aside>
